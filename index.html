<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт на техническом обслуживании</title>
    <style>
        body {
            background-color: #f4b400;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: #000;
            margin: 0;
            text-align: center;
        }

        .container {
            font-size: 40px;
        }

        .countdown {
            font-size: 40px;
            font-weight: bold;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .time-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>

</body>
