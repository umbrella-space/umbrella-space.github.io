<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт на техническом обслуживании</title>
    <style>
        body {
            background-color: #f4b400;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: #000;
            margin: 0;
            text-align: center;
        }

        .container {
            font-size: 40px;
        }

        .countdown {
            font-size: 40px;
            font-weight: bold;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .time-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>


    <script>
        // Установка конечной даты
        const targetDate = new Date("November 1, 2024 00:00:00").getTime();

        // Обновление таймера каждую секунду
        const countdownTimer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Расчет времени
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Вывод на экран
            document.getElementById("days").textContent = days.toString().padStart(2, '0');
            document.getElementById("hours").textContent = hours.toString().padStart(2, '0');
            document.getElementById("minutes").textContent = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").textContent = seconds.toString().padStart(2, '0');

            // Если дата достигнута
            if (distance < 0) {
                clearInterval(countdownTimer);
                document.querySelector(".countdown").textContent = "Работы завершены!";
            }
        }, 1000);
    </script>
</body>
</html>
